<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Alejandra</title>
    <style>
        :root {
            --bg:           #f0f4f8;
            --primary:      #7c3aed;
            --primary-light:#ede9fe;
            --income:       #059669;
            --income-light: #d1fae5;
            --pending-inc:  #d97706;
            --pending-light:#fef3c7;
            --expense:      #dc2626;
            --expense-light:#fee2e2;
            --parami:       #7c3aed;
            --parami-light: #ede9fe;
            --otro:         #0ea5e9;
            --otro-light:   #e0f2fe;
            --text:         #1e293b;
            --text-muted:   #64748b;
            --border:       #e2e8f0;
            --shadow:       0 1px 3px rgba(0,0,0,0.09), 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md:    0 4px 6px -1px rgba(0,0,0,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.875rem 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow);
        }
        .header-title { display:flex; align-items:center; gap:0.6rem; }
        .logo {
            width:32px; height:32px;
            background: linear-gradient(135deg,#7c3aed,#a855f7);
            border-radius:8px; display:flex; align-items:center;
            justify-content:center; font-size:1rem;
        }
        .header-title h1 { font-size:1.1rem; font-weight:700; }
        .month-nav {
            display:flex; align-items:center; gap:0.75rem;
            background:var(--bg); border-radius:10px; padding:0.35rem 0.75rem;
        }
        .month-nav button {
            background:none; border:none; width:28px; height:28px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            color:var(--text-muted); font-size:1.25rem; border-radius:6px;
            transition:all 0.15s;
        }
        .month-nav button:hover { background:var(--primary-light); color:var(--primary); }
        .month-name { font-weight:600; font-size:0.95rem; min-width:140px; text-align:center; }
        .reset-btn {
            background:none; border:1px solid var(--border); border-radius:8px;
            padding:0.35rem 0.75rem; font-size:0.75rem; cursor:pointer;
            color:var(--text-muted); transition:all 0.2s;
        }
        .reset-btn:hover { border-color:var(--expense); color:var(--expense); }

        /* ── BALANCE HERO ── */
        .balance-hero {
            background: linear-gradient(135deg,#7c3aed 0%,#6d28d9 50%,#5b21b6 100%);
            color:white; padding:2rem 2rem 1.75rem; text-align:center;
            position:relative; overflow:hidden;
        }
        .balance-hero::before {
            content:''; position:absolute; top:-60px; right:-60px;
            width:200px; height:200px; background:rgba(255,255,255,0.05); border-radius:50%;
        }
        .balance-hero::after {
            content:''; position:absolute; bottom:-80px; left:-40px;
            width:250px; height:250px; background:rgba(255,255,255,0.04); border-radius:50%;
        }
        .balance-label { font-size:0.75rem; opacity:0.75; text-transform:uppercase; letter-spacing:.1em; margin-bottom:.5rem; }
        .balance-amount {
            font-size:3.25rem; font-weight:800; letter-spacing:-.03em;
            transition:color 0.3s; position:relative; z-index:1;
        }
        .balance-amount.negative { color:#fca5a5; }
        .balance-amount.warning  { color:#fde68a; }
        .balance-hint { font-size:0.8rem; opacity:0.65; margin-top:.4rem; position:relative; z-index:1; }

        /* ── SUMMARY CARDS ── */
        .summary-wrap {
            padding:1.25rem 1.75rem; max-width:1280px; margin:0 auto;
            display:grid; grid-template-columns:repeat(3,1fr); gap:1rem;
        }
        .scard {
            background:white; border-radius:14px; padding:1.1rem 1.25rem;
            box-shadow:var(--shadow); border-left:4px solid transparent;
        }
        .scard.income  { border-left-color:var(--income); }
        .scard.expense { border-left-color:var(--expense); }
        .scard.pending { border-left-color:var(--pending-inc); }
        .scard-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.4rem; }
        .scard-amount { font-size:1.45rem; font-weight:700; margin-bottom:.2rem; }
        .scard.income  .scard-amount { color:var(--income); }
        .scard.expense .scard-amount { color:var(--expense); }
        .scard.pending .scard-amount { color:var(--pending-inc); }
        .scard-sub { font-size:0.72rem; color:var(--text-muted); }
        .progress-bar { width:100%; height:5px; background:var(--border); border-radius:3px; margin-top:.75rem; overflow:hidden; }
        .progress-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
        .scard.income  .progress-fill { background:var(--income); }
        .scard.expense .progress-fill { background:var(--expense); }

        /* ── MAIN GRID ── */
        .main-grid {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:1.25rem;
            padding:0 1.75rem 2rem;
            max-width:1280px;
            margin:0 auto;
            align-items:start;
        }
        .col { display:flex; flex-direction:column; gap:1.25rem; }

        /* ── SECTION CARD ── */
        .section {
            background:white; border-radius:14px;
            box-shadow:var(--shadow); overflow:hidden;
        }
        .section-head {
            padding:0.9rem 1.25rem; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
        }
        .section-head h2 {
            font-size:0.95rem; font-weight:700;
            display:flex; align-items:center; gap:0.5rem;
        }
        .section-icon {
            width:26px; height:26px; border-radius:7px;
            display:flex; align-items:center; justify-content:center; font-size:0.85rem;
        }
        .icon-income  { background:var(--income-light);  color:var(--income);      }
        .icon-pendiente { background:var(--pending-light); color:var(--pending-inc); }
        .icon-fijo    { background:var(--expense-light); color:var(--expense);     }
        .icon-parami  { background:var(--parami-light);  color:var(--parami);      }
        .icon-otro    { background:var(--otro-light);    color:var(--otro);        }

        .add-btn {
            background:none; border:1.5px dashed var(--border); border-radius:8px;
            padding:.25rem .7rem; font-size:.73rem; font-weight:600; cursor:pointer;
            color:var(--text-muted); transition:all 0.2s;
        }
        .add-btn:hover { border-color:var(--primary); color:var(--primary); }

        /* ── ITEMS ── */
        .items-list { overflow-y:auto; }

        .item {
            display:flex; align-items:center; gap:0.65rem;
            padding:0.7rem 1.25rem; border-bottom:1px solid #f1f5f9;
            transition:background 0.12s;
        }
        .item:last-child { border-bottom:none; }
        .item:hover { background:#f8fafc; }
        .item.done { background:#f8fffe; }
        .item.done:hover { background:#f0fff9; }

        .toggle {
            width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
            background:white; cursor:pointer; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:.7rem; transition:all 0.2s; color:white;
        }
        .income-item   .toggle:hover { border-color:var(--income);       background:var(--income-light);  }
        .income-item   .toggle.on    { border-color:var(--income);       background:var(--income);        }
        .pendiente-item .toggle:hover{ border-color:var(--pending-inc);  background:var(--pending-light); }
        .pendiente-item .toggle.on   { border-color:var(--pending-inc);  background:var(--pending-inc);   }
        .expense-item  .toggle:hover { border-color:var(--expense);      background:var(--expense-light); }
        .expense-item  .toggle.on    { border-color:var(--expense);      background:var(--expense);       }

        .item-name {
            flex:1; font-size:.855rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .item.done .item-name { color:var(--text-muted); text-decoration:line-through; }

        .badge {
            font-size:.62rem; padding:.15rem .55rem; border-radius:9999px;
            font-weight:700; text-transform:uppercase; letter-spacing:.04em; flex-shrink:0;
        }
        .income-item    .badge { background:var(--income-light);  color:var(--income);      }
        .pendiente-item .badge { background:var(--pending-light); color:var(--pending-inc); }
        .expense-item   .badge { background:var(--expense-light); color:var(--expense);     }

        .item-amount {
            font-size:.855rem; font-weight:700; cursor:pointer; flex-shrink:0;
            padding:.15rem .25rem; border-radius:4px; transition:background 0.15s;
        }
        .item-amount:hover { background:var(--primary-light); }
        .income-item   .item-amount { color:var(--income);      }
        .pendiente-item .item-amount { color:var(--pending-inc); }
        .expense-item  .item-amount { color:var(--expense);     }
        .item.done     .item-amount { color:var(--text-muted); text-decoration:line-through; }

        .edit-btn, .delete-btn {
            background:none; border:none; cursor:pointer;
            font-size:.9rem; line-height:1; padding:.2rem .25rem; border-radius:4px;
            opacity:0; transition:all 0.15s; flex-shrink:0;
        }
        .item:hover .edit-btn,
        .item:hover .delete-btn { opacity:1; }
        .edit-btn   { color:#94a3b8; }
        .delete-btn { color:#cbd5e1; }
        .edit-btn:hover   { color:var(--primary); background:var(--primary-light); }
        .delete-btn:hover { color:var(--expense); background:var(--expense-light); }

        .amount-input {
            border:1.5px solid var(--primary); border-radius:6px;
            padding:.15rem .4rem; font-size:.855rem; font-weight:700;
            width:80px; text-align:right; outline:none;
            background:var(--primary-light);
        }

        /* ── SECTION FOOTER ── */
        .section-foot {
            padding:.75rem 1.25rem; border-top:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            font-size:.78rem; color:var(--text-muted);
            background:#fafbfc;
        }
        .section-foot strong { color:var(--text); font-size:.88rem; }

        /* ── EMPTY STATE ── */
        .empty-state {
            padding:1.25rem; text-align:center;
            color:var(--text-muted); font-size:.82rem; font-style:italic;
        }

        /* ── MODAL ── */
        .overlay {
            position:fixed; inset:0; background:rgba(15,23,42,0.45);
            display:flex; align-items:center; justify-content:center;
            z-index:200; opacity:0; pointer-events:none;
            transition:opacity 0.2s; backdrop-filter:blur(2px);
        }
        .overlay.open { opacity:1; pointer-events:all; }
        .modal {
            background:white; border-radius:18px; padding:1.75rem;
            width:420px; max-width:94vw;
            box-shadow:0 20px 60px rgba(0,0,0,0.2);
            transform:translateY(24px) scale(0.97);
            transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
        }
        .overlay.open .modal { transform:translateY(0) scale(1); }
        .modal h3 { font-size:1.1rem; font-weight:700; margin-bottom:1.25rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label {
            display:block; font-size:.73rem; font-weight:700;
            color:var(--text-muted); text-transform:uppercase;
            letter-spacing:.07em; margin-bottom:.4rem;
        }
        .form-group input, .form-group select {
            width:100%; border:1.5px solid var(--border); border-radius:10px;
            padding:.65rem .85rem; font-size:.9rem; outline:none;
            transition:border-color 0.2s; color:var(--text);
        }
        .form-group input:focus, .form-group select:focus { border-color:var(--primary); }
        .modal-actions { display:flex; gap:.75rem; margin-top:1.5rem; }
        .btn { flex:1; padding:.7rem; border-radius:10px; font-size:.875rem; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
        .btn-primary   { background:var(--primary); color:white; }
        .btn-primary:hover { background:#6d28d9; }
        .btn-secondary { background:var(--bg); color:var(--text); border:1px solid var(--border); }
        .btn-secondary:hover { background:var(--border); }

        /* ── RESPONSIVE ── */
        @media (max-width:800px) {
            .summary-wrap { grid-template-columns:1fr; padding:1rem; }
            .main-grid    { grid-template-columns:1fr; padding:0 1rem 1.5rem; }
            .header       { padding:.75rem 1rem; }
            .balance-amount { font-size:2.5rem; }
            .reset-btn    { display:none; }
        }
    </style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header class="header">
    <div class="header-title">
        <div class="logo">💜</div>
        <h1>Alejandra</h1>
    </div>
    <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-name" id="monthName"></span>
        <button id="nextMonth">›</button>
    </div>
    <button class="reset-btn" id="resetBtn">Reiniciar mes</button>
</header>

<!-- ═══════════════ BALANCE HERO ═══════════════ -->
<div class="balance-hero">
    <div class="balance-label">Balance disponible</div>
    <div class="balance-amount" id="balanceAmount">$0.00</div>
    <div class="balance-hint"   id="balanceHint"></div>
</div>

<!-- ═══════════════ SUMMARY CARDS ═══════════════ -->
<div class="summary-wrap">
    <div class="scard income">
        <div class="scard-label">Dinero cobrado</div>
        <div class="scard-amount" id="incomeReceived">$0.00</div>
        <div class="scard-sub"    id="incomeSub"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="incomeBar" style="width:0%"></div>
        </div>
    </div>
    <div class="scard expense">
        <div class="scard-label">Gastos pagados</div>
        <div class="scard-amount" id="expensePaid">$0.00</div>
        <div class="scard-sub"    id="expenseSub"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="expenseBar" style="width:0%"></div>
        </div>
    </div>
    <div class="scard pending">
        <div class="scard-label">Gastos por pagar</div>
        <div class="scard-amount" id="gastosPendientes">$0.00</div>
        <div class="scard-sub"    id="gastosPendientesSub"></div>
    </div>
</div>

<!-- ═══════════════ MAIN GRID ═══════════════ -->
<div class="main-grid">

    <!-- COLUMNA IZQUIERDA -->
    <div class="col">

        <!-- Ingresos -->
        <div class="section">
            <div class="section-head">
                <h2><span class="section-icon icon-income">↑</span>Ingresos</h2>
                <button class="add-btn" onclick="abrirModal('ingreso')">+ Agregar</button>
            </div>
            <div class="items-list" id="incomeList"></div>
            <div class="section-foot">
                <span>Total esperado</span>
                <strong id="incomeTotalFoot">$0.00</strong>
            </div>
        </div>

        <!-- Pagos Pendientes (lo que le deben) -->
        <div class="section">
            <div class="section-head">
                <h2><span class="section-icon icon-pendiente">⧗</span>Pagos Pendientes</h2>
                <button class="add-btn" onclick="abrirModal('pendiente')">+ Agregar</button>
            </div>
            <div class="items-list" id="pendienteList"></div>
            <div class="section-foot">
                <span>Por cobrar</span>
                <strong id="pendienteTotalFoot">$0.00</strong>
            </div>
        </div>

    </div>

    <!-- COLUMNA DERECHA -->
    <div class="col">

        <!-- Gastos Fijos -->
        <div class="section">
            <div class="section-head">
                <h2><span class="section-icon icon-fijo">↓</span>Gastos Fijos</h2>
                <button class="add-btn" onclick="abrirModal('gasto','fijo')">+ Agregar</button>
            </div>
            <div class="items-list" id="gastosFijosList"></div>
            <div class="section-foot">
                <span>Total fijos</span>
                <strong id="gastosFijosFoot">$0.00</strong>
            </div>
        </div>

        <!-- Para Mí -->
        <div class="section">
            <div class="section-head">
                <h2><span class="section-icon icon-parami">♥</span>Para Mí</h2>
                <button class="add-btn" onclick="abrirModal('gasto','parami')">+ Agregar</button>
            </div>
            <div class="items-list" id="gastosParaMiList"></div>
            <div class="section-foot">
                <span>Total para mí</span>
                <strong id="gastosParaMiFoot">$0.00</strong>
            </div>
        </div>

        <!-- Otros Gastos -->
        <div class="section">
            <div class="section-head">
                <h2><span class="section-icon icon-otro">◎</span>Otros Gastos</h2>
                <button class="add-btn" onclick="abrirModal('gasto','otro')">+ Agregar</button>
            </div>
            <div class="items-list" id="gastosOtrosList"></div>
            <div class="section-foot">
                <span>Total otros</span>
                <strong id="gastosOtrosFoot">$0.00</strong>
            </div>
        </div>

    </div>
</div>

<!-- ═══════════════ MODAL ═══════════════ -->
<div class="overlay" id="overlay">
    <div class="modal">
        <h3 id="modalTitle">Agregar</h3>
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="mNombre" placeholder="Nombre">
        </div>
        <div class="form-group">
            <label>Monto ($)</label>
            <input type="number" id="mMonto" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="mCancel">Cancelar</button>
            <button class="btn btn-primary"   id="mSave">Guardar</button>
        </div>
    </div>
</div>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script>
/* ─────────────────────────────────────────
   PLANTILLA BASE
   · Ingresos y Gastos Fijos: iguales en todos los meses
   · Para Mí, Otros y Pagos Pendientes: vacíos por defecto
───────────────────────────────────────── */
const PLANTILLA = {
    ingresos: [
        { nombre: "Andrea Nieli", monto: 200 },
        { nombre: "Michi",        monto: 120 },
        { nombre: "Livre",        monto: 50  },
        { nombre: "Valora",       monto: 150 },
        { nombre: "Neo",          monto: 400 },
        { nombre: "Click",        monto: 120 },
        { nombre: "Cambotti",     monto: 50  },
    ],
    gastosFijos: [
        { nombre: "Datalink Guacuco",   monto: 27    },
        { nombre: "Datalink Santa Ana", monto: 27    },
        { nombre: "CANTV / CORPOELEC",  monto: 25    },
        { nombre: "Datalinks JJ",       monto: 63    },
        { nombre: "Gym",                monto: 60    },
        { nombre: "Andrea",             monto: 15    },
        { nombre: "Condominio",         monto: 56.26 },
    ],
};

// Datos especiales de Abril 2026
const ABRIL_PENDIENTES = [
    { nombre: "JJVQ",          monto: 187.5 },
    { nombre: "A/A camioneta", monto: 50    },
    { nombre: "Rebe me tiene", monto: 50    },
];

/* ─────────────────────────────────────────
   ESTADO
───────────────────────────────────────── */
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let cur          = new Date();
let mesKey       = getMesKey(cur);
let modalTipo    = null;
let modalSubTipo = null;
let editingId    = null;
let editingTipo  = null;
let data         = cargarDatos(mesKey);

function getMesKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getMesNombre(d) {
    return `${MESES[d.getMonth()]} ${d.getFullYear()}`;
}
function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

/* Migra datos guardados al nuevo formato (tipo en gastos + pagosPendientes) */
function migrar(d, key) {
    // Asegurar campo tipo en gastos
    const FIJOS = ["Datalink Guacuco","Datalink Santa Ana","CANTV","Datalinks JJ","Gym","Andrea","Condominio"];
    d.gastos = (d.gastos || []).map(g => {
        if (g.tipo) return g;
        if (FIJOS.some(n => g.nombre.toLowerCase().includes(n.toLowerCase()))) return {...g, tipo:'fijo'};
        if (g.nombre.toLowerCase().includes('para m')) return {...g, tipo:'parami'};
        return {...g, tipo:'otro'};
    });

    // Agregar pagosPendientes si no existe
    if (!d.pagosPendientes) {
        d.pagosPendientes = key === '2026-04'
            ? ABRIL_PENDIENTES.map(p => ({ id:uid(), nombre:p.nombre, monto:p.monto, cobrado:false }))
            : [];
    }

    return d;
}

function cargarDatos(key) {
    const raw = localStorage.getItem(`ale_${key}`);
    if (raw) return migrar(JSON.parse(raw), key);

    const esMesEspecial = key === '2026-04';

    return {
        ingresos: PLANTILLA.ingresos.map(i => ({
            id:uid(), nombre:i.nombre, monto:i.monto, cobrado:false
        })),
        gastos: PLANTILLA.gastosFijos.map(g => ({
            id:uid(), nombre:g.nombre, monto:g.monto, tipo:'fijo', pagado:false
        })),
        pagosPendientes: esMesEspecial
            ? ABRIL_PENDIENTES.map(p => ({ id:uid(), nombre:p.nombre, monto:p.monto, cobrado:false }))
            : [],
    };
}

function guardar() {
    localStorage.setItem(`ale_${mesKey}`, JSON.stringify(data));
}

/* ─────────────────────────────────────────
   CÁLCULOS
───────────────────────────────────────── */
function totales() {
    const totalIngreso    = data.ingresos.reduce((s,i) => s + i.monto, 0);
    const cobradoIngreso  = data.ingresos.filter(i => i.cobrado).reduce((s,i) => s + i.monto, 0);
    const totalPendiente  = data.pagosPendientes.reduce((s,p) => s + p.monto, 0);
    const cobradoPendiente= data.pagosPendientes.filter(p => p.cobrado).reduce((s,p) => s + p.monto, 0);
    const cobradoTotal    = cobradoIngreso + cobradoPendiente;

    const totalGasto  = data.gastos.reduce((s,g) => s + g.monto, 0);
    const pagado      = data.gastos.filter(g => g.pagado).reduce((s,g) => s + g.monto, 0);
    const porPagar    = totalGasto - pagado;
    const balance     = cobradoTotal - pagado;

    return { totalIngreso, cobradoIngreso, totalPendiente, cobradoPendiente,
             cobradoTotal, totalGasto, pagado, porPagar, balance };
}

/* ─────────────────────────────────────────
   FORMATO
───────────────────────────────────────── */
function fmt(n) {
    const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    return (n < 0 ? '-' : '') + '$' + abs;
}

/* ─────────────────────────────────────────
   RENDER PRINCIPAL
───────────────────────────────────────── */
function render() {
    const t = totales();

    document.getElementById('monthName').textContent = getMesNombre(cur);

    const balEl = document.getElementById('balanceAmount');
    balEl.textContent = fmt(t.balance);
    balEl.className   = 'balance-amount' +
        (t.balance < 0 ? ' negative' : t.balance < 50 ? ' warning' : '');

    document.getElementById('balanceHint').textContent = t.porPagar > 0
        ? `Aún tenés ${fmt(t.porPagar)} en gastos por pagar`
        : (t.balance >= 0 ? 'Todos los gastos al día ✓' : '');

    // Summary cards
    document.getElementById('incomeReceived').textContent = fmt(t.cobradoTotal);
    document.getElementById('incomeSub').textContent =
        `ingresos + pendientes cobrados de ${fmt(t.totalIngreso + t.totalPendiente)} disponibles`;
    document.getElementById('expensePaid').textContent = fmt(t.pagado);
    document.getElementById('expenseSub').textContent =
        `de ${fmt(t.totalGasto)} a pagar · ${data.gastos.filter(g=>g.pagado).length}/${data.gastos.length} gastos`;
    document.getElementById('gastosPendientes').textContent = fmt(t.porPagar);
    document.getElementById('gastosPendientesSub').textContent =
        `${data.gastos.filter(g=>!g.pagado).length} pagos pendientes`;

    const pI = (t.totalIngreso + t.totalPendiente) > 0
        ? (t.cobradoTotal / (t.totalIngreso + t.totalPendiente) * 100) : 0;
    const pE = t.totalGasto > 0 ? (t.pagado / t.totalGasto * 100) : 0;
    document.getElementById('incomeBar').style.width  = pI + '%';
    document.getElementById('expenseBar').style.width = pE + '%';

    // Footers individuales
    document.getElementById('incomeTotalFoot').textContent   = fmt(t.totalIngreso);
    document.getElementById('pendienteTotalFoot').textContent = fmt(t.totalPendiente);
    document.getElementById('gastosFijosFoot').textContent   = fmt(subTotal('fijo'));
    document.getElementById('gastosParaMiFoot').textContent  = fmt(subTotal('parami'));
    document.getElementById('gastosOtrosFoot').textContent   = fmt(subTotal('otro'));

    // Listas
    renderLista('incomeList',       data.ingresos,                           'ingreso');
    renderLista('pendienteList',    data.pagosPendientes,                    'pendiente');
    renderLista('gastosFijosList',  data.gastos.filter(g=>g.tipo==='fijo'),  'gasto');
    renderLista('gastosParaMiList', data.gastos.filter(g=>g.tipo==='parami'),'gasto');
    renderLista('gastosOtrosList',  data.gastos.filter(g=>g.tipo==='otro'),  'gasto');
}

function subTotal(tipo) {
    return data.gastos.filter(g=>g.tipo===tipo).reduce((s,g)=>s+g.monto,0);
}

/* ─────────────────────────────────────────
   RENDER LISTAS
───────────────────────────────────────── */
function crearItemEl(item, tipo) {
    const esIngreso = tipo === 'ingreso' || tipo === 'pendiente';
    const done  = esIngreso ? item.cobrado : item.pagado;
    const cls   = tipo === 'ingreso' ? 'income-item'
                : tipo === 'pendiente' ? 'pendiente-item'
                : 'expense-item';
    const label = done ? (esIngreso ? 'Cobrado' : 'Pagado') : '';
    const title = done
        ? (esIngreso ? 'Marcar como no cobrado' : 'Marcar como no pagado')
        : (esIngreso ? 'Marcar como cobrado'    : 'Marcar como pagado');

    const div = document.createElement('div');
    div.className = `item ${cls}${done ? ' done' : ''}`;
    div.innerHTML = `
        <button class="toggle ${done?'on':''}"
                onclick="toggleItem('${item.id}','${tipo}')"
                title="${title}">${done ? '✓' : ''}</button>
        <span class="item-name" title="${item.nombre}">${item.nombre}</span>
        ${done ? `<span class="badge">${label}</span>` : ''}
        <span class="item-amount">${fmt(item.monto)}</span>
        <button class="edit-btn"
                onclick="abrirEdicion('${item.id}','${tipo}')"
                title="Editar">✎</button>
        <button class="delete-btn"
                onclick="eliminar('${item.id}','${tipo}')"
                title="Eliminar">×</button>
    `;
    return div;
}

function renderLista(containerId, items, tipo) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    if (!items.length) {
        c.innerHTML = '<div class="empty-state">Vacío — usá + para agregar</div>';
        return;
    }
    const esIngreso = tipo === 'ingreso' || tipo === 'pendiente';
    const sorted = [...items].sort((a,b) =>
        (esIngreso ? a.cobrado - b.cobrado : a.pagado - b.pagado));
    sorted.forEach(item => c.appendChild(crearItemEl(item, tipo)));
}

/* ─────────────────────────────────────────
   ACCIONES
───────────────────────────────────────── */
function toggleItem(id, tipo) {
    if (tipo === 'ingreso') {
        const i = data.ingresos.find(x => x.id === id);
        if (i) i.cobrado = !i.cobrado;
    } else if (tipo === 'pendiente') {
        const p = data.pagosPendientes.find(x => x.id === id);
        if (p) p.cobrado = !p.cobrado;
    } else {
        const g = data.gastos.find(x => x.id === id);
        if (g) g.pagado = !g.pagado;
    }
    guardar(); render();
}

function eliminar(id, tipo) {
    if (!confirm('¿Eliminar este elemento?')) return;
    if      (tipo === 'ingreso')   data.ingresos        = data.ingresos.filter(x=>x.id!==id);
    else if (tipo === 'pendiente') data.pagosPendientes = data.pagosPendientes.filter(x=>x.id!==id);
    else                           data.gastos          = data.gastos.filter(x=>x.id!==id);
    guardar(); render();
}


/* ─────────────────────────────────────────
   MODAL  (crear o editar)
───────────────────────────────────────── */
function abrirModal(tipo, subTipo = null) {
    modalTipo    = tipo;
    modalSubTipo = subTipo;
    editingId    = null;
    editingTipo  = null;

    const titulos = {
        ingreso:   'Agregar ingreso',
        pendiente: 'Agregar pago pendiente',
        gasto:     subTipo === 'fijo'   ? 'Agregar gasto fijo'
                 : subTipo === 'parami' ? 'Agregar gasto para mí'
                 :                       'Agregar otro gasto',
    };
    document.getElementById('modalTitle').textContent = titulos[tipo] || 'Agregar';
    document.getElementById('mNombre').value = '';
    document.getElementById('mMonto').value  = '';
    document.getElementById('mSave').textContent = 'Guardar';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('mNombre').focus();
}

function abrirEdicion(id, tipo) {
    const lista = tipo === 'ingreso'   ? data.ingresos
                : tipo === 'pendiente' ? data.pagosPendientes
                : data.gastos;
    const item = lista.find(x => x.id === id);
    if (!item) return;

    editingId   = id;
    editingTipo = tipo;
    modalTipo    = tipo;
    modalSubTipo = item.tipo || null;

    const titulos = {
        ingreso:   'Editar ingreso',
        pendiente: 'Editar pago pendiente',
        gasto:     item.tipo === 'fijo'   ? 'Editar gasto fijo'
                 : item.tipo === 'parami' ? 'Editar gasto para mí'
                 :                         'Editar otro gasto',
    };
    document.getElementById('modalTitle').textContent = titulos[tipo] || 'Editar';
    document.getElementById('mNombre').value = item.nombre;
    document.getElementById('mMonto').value  = item.monto;
    document.getElementById('mSave').textContent = 'Actualizar';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('mNombre').focus();
    document.getElementById('mNombre').select();
}

function cerrarModal() {
    document.getElementById('overlay').classList.remove('open');
    modalTipo = modalSubTipo = editingId = editingTipo = null;
}

document.getElementById('mCancel').addEventListener('click', cerrarModal);
document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) cerrarModal();
});

document.getElementById('mSave').addEventListener('click', () => {
    const nombre = document.getElementById('mNombre').value.trim();
    const monto  = parseFloat(document.getElementById('mMonto').value);
    if (!nombre) { document.getElementById('mNombre').focus(); return; }
    if (isNaN(monto) || monto <= 0) { document.getElementById('mMonto').focus(); return; }

    if (editingId) {
        // Modo edición: actualizar el item existente
        const lista = editingTipo === 'ingreso'   ? data.ingresos
                    : editingTipo === 'pendiente' ? data.pagosPendientes
                    : data.gastos;
        const item = lista.find(x => x.id === editingId);
        if (item) { item.nombre = nombre; item.monto = monto; }
    } else {
        // Modo creación: agregar nuevo
        if (modalTipo === 'ingreso') {
            data.ingresos.push({ id:uid(), nombre, monto, cobrado:false });
        } else if (modalTipo === 'pendiente') {
            data.pagosPendientes.push({ id:uid(), nombre, monto, cobrado:false });
        } else {
            data.gastos.push({ id:uid(), nombre, monto, tipo:modalSubTipo, pagado:false });
        }
    }
    guardar(); cerrarModal(); render();
});

document.getElementById('mMonto').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('mSave').click();
});

/* ─────────────────────────────────────────
   NAVEGACIÓN DE MESES
───────────────────────────────────────── */
document.getElementById('prevMonth').addEventListener('click', () => {
    cur    = new Date(cur.getFullYear(), cur.getMonth()-1, 1);
    mesKey = getMesKey(cur); data = cargarDatos(mesKey); render();
});
document.getElementById('nextMonth').addEventListener('click', () => {
    cur    = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    mesKey = getMesKey(cur); data = cargarDatos(mesKey); render();
});
document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm(`¿Reiniciar ${getMesNombre(cur)} con la plantilla base?\nSe perderán todos los cambios de este mes.`)) return;
    localStorage.removeItem(`ale_${mesKey}`);
    data = cargarDatos(mesKey); render();
});

/* ─────────────────────────────────────────
   INICIO
───────────────────────────────────────── */
render();
</script>
</body>
</html>

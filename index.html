<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Alejandra</title>
    <style>
        :root {
            --bg:      #f0f4f8;
            --primary: #7c3aed;
            --pri-lt:  #ede9fe;
            --text:    #1e293b;
            --muted:   #64748b;
            --border:  #e2e8f0;
            --shadow:  0 1px 3px rgba(0,0,0,0.09),0 1px 2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.18);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

        /* ── HEADER ── */
        .header{background:#fff;border-bottom:1px solid var(--border);padding:.875rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
        .header-title{display:flex;align-items:center;gap:.6rem;}
        .logo{width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;}
        .header-title h1{font-size:1.1rem;font-weight:700;}
        .month-nav{display:flex;align-items:center;gap:.75rem;background:var(--bg);border-radius:10px;padding:.35rem .75rem;}
        .month-nav button{background:none;border:none;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1.25rem;border-radius:6px;transition:all .15s;}
        .month-nav button:hover{background:var(--pri-lt);color:var(--primary);}
        .month-name{font-weight:600;font-size:.95rem;min-width:140px;text-align:center;}
        .reset-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:.35rem .75rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .2s;}
        .reset-btn:hover{border-color:#dc2626;color:#dc2626;}

        /* ── BALANCE HERO ── */
        .balance-hero{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;padding:2rem 2rem 1.75rem;text-align:center;position:relative;overflow:hidden;}
        .balance-hero::before,.balance-hero::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.05);}
        .balance-hero::before{top:-60px;right:-60px;width:200px;height:200px;}
        .balance-hero::after{bottom:-80px;left:-40px;width:250px;height:250px;}
        .balance-label{font-size:.75rem;opacity:.75;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;}
        .balance-amount{font-size:3.25rem;font-weight:800;letter-spacing:-.03em;transition:color .3s;position:relative;z-index:1;}
        .balance-amount.neg{color:#fca5a5;}
        .balance-amount.warn{color:#fde68a;}
        .balance-hint{font-size:.8rem;opacity:.65;margin-top:.4rem;position:relative;z-index:1;}

        /* ── SUMMARY CARDS ── */
        .summary-wrap{padding:1.25rem 1.75rem;max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
        .scard{background:#fff;border-radius:14px;padding:1.1rem 1.25rem;box-shadow:var(--shadow);border-left:4px solid;}
        .scard-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem;}
        .scard-amount{font-size:1.45rem;font-weight:700;margin-bottom:.2rem;}
        .scard-sub{font-size:.72rem;color:var(--muted);}
        .progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;margin-top:.75rem;overflow:hidden;}
        .progress-fill{height:100%;border-radius:3px;transition:width .4s ease;}

        /* ── MAIN GRID ── */
        .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;padding:0 1.75rem 2rem;max-width:1280px;margin:0 auto;align-items:start;}
        .col{display:flex;flex-direction:column;gap:1.25rem;}

        /* ── SECTION CARD ── */
        .section{background:#fff;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;
                 --sec:#94a3b8;--sec-lt:#f1f5f9;border-left:4px solid var(--sec);}
        .section-head{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
        .sec-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:var(--sec-lt);color:var(--sec);flex-shrink:0;}
        .sec-name{font-size:.9rem;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .sec-name-input{font-size:.9rem;font-weight:700;border:1.5px solid var(--primary);border-radius:6px;padding:.1rem .4rem;outline:none;flex:1;background:var(--pri-lt);}
        .sec-actions{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
        .sec-btn{background:none;border:none;cursor:pointer;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#cbd5e1;opacity:0;transition:all .15s;}
        .section-head:hover .sec-btn{opacity:1;}
        .sec-btn:hover{background:var(--sec-lt);color:var(--sec);}
        .sec-btn.del:hover{background:#fee2e2;color:#dc2626;}
        .add-btn{background:none;border:1.5px dashed var(--border);border-radius:8px;padding:.2rem .65rem;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0;}
        .add-btn:hover{border-color:var(--primary);color:var(--primary);}

        /* ── ITEMS ── */
        .items-list{overflow-y:auto;}
        .item{display:flex;align-items:center;gap:.6rem;padding:.65rem 1.1rem;border-bottom:1px solid #f1f5f9;transition:background .12s;}
        .item:last-child{border-bottom:none;}
        .item:hover{background:#f8fafc;}
        .item.done{opacity:.7;background:#f8fffe;}
        .item.partial{background:#fffbeb;}
        .split-part{padding-left:2.5rem;background:#fafafa;border-left:2px solid var(--sec-lt);}
        .split-part:last-child{border-bottom:none;}

        .toggle{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .2s;color:#fff;}
        .toggle:hover{border-color:var(--sec);background:var(--sec-lt);}
        .toggle.on{border-color:var(--sec);background:var(--sec);}
        .split-status{width:21px;height:21px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;background:var(--sec-lt);color:var(--sec);}
        .split-status.partial-icon{background:#fef3c7;color:#d97706;}

        .item-name{flex:1;font-size:.845rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .item.done .item-name,.item.partial.done .item-name{color:var(--muted);text-decoration:line-through;}
        .item-parent .item-name{font-weight:600;}

        .badge{font-size:.6rem;padding:.12rem .5rem;border-radius:9999px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;background:var(--sec-lt);color:var(--sec);}
        .item-amount{font-size:.845rem;font-weight:700;flex-shrink:0;color:var(--sec);}
        .item.done .item-amount{color:var(--muted);text-decoration:line-through;}
        .item.partial .item-amount{color:var(--muted);}

        .edit-btn,.del-item-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:.15rem .2rem;border-radius:4px;opacity:0;transition:all .15s;flex-shrink:0;color:#cbd5e1;}
        .item:hover .edit-btn,.item:hover .del-item-btn{opacity:1;}
        .edit-btn:hover{color:var(--primary);background:var(--pri-lt);}
        .del-item-btn:hover{color:#dc2626;background:#fee2e2;}

        .amount-input{border:1.5px solid var(--primary);border-radius:6px;padding:.12rem .35rem;font-size:.845rem;font-weight:700;width:75px;text-align:right;outline:none;background:var(--pri-lt);}

        /* ── SECTION FOOTER ── */
        .section-foot{padding:.65rem 1.1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--muted);background:#fafbfc;}
        .section-foot strong{color:var(--text);font-size:.85rem;}

        /* ── ADD SECTION BUTTON ── */
        .add-section-btn{border:2px dashed var(--border);border-radius:14px;padding:.9rem;text-align:center;cursor:pointer;font-size:.8rem;color:var(--muted);background:transparent;width:100%;transition:all .2s;}
        .add-section-btn:hover{border-color:var(--primary);color:var(--primary);background:#fff;}

        /* ── EMPTY STATE ── */
        .empty-state{padding:1.1rem;text-align:center;color:var(--muted);font-size:.8rem;font-style:italic;}

        /* ── MODAL ── */
        .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);}
        .overlay.open{opacity:1;pointer-events:all;}
        .modal{background:#fff;border-radius:18px;padding:1.75rem;width:440px;max-width:94vw;box-shadow:var(--shadow-lg);transform:translateY(24px) scale(.97);transition:transform .22s cubic-bezier(.34,1.56,.64,1);}
        .overlay.open .modal{transform:translateY(0) scale(1);}
        .modal h3{font-size:1.05rem;font-weight:700;margin-bottom:1.25rem;}
        .form-group{margin-bottom:.9rem;}
        .form-group label{display:block;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;}
        .form-group input,.form-group select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.6rem .8rem;font-size:.875rem;outline:none;transition:border-color .2s;color:var(--text);}
        .form-group input:focus,.form-group select:focus{border-color:var(--primary);}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
        .split-toggle{display:flex;align-items:center;gap:.6rem;padding:.65rem .8rem;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none;}
        .split-toggle:hover{border-color:var(--primary);}
        .split-toggle.active{border-color:var(--primary);background:var(--pri-lt);}
        .split-toggle input[type=checkbox]{display:none;}
        .split-pill{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0;}
        .split-pill::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
        .split-toggle.active .split-pill{background:var(--primary);}
        .split-toggle.active .split-pill::after{transform:translateX(16px);}
        .split-details{margin-top:.75rem;padding:.85rem;background:#f8fafc;border-radius:10px;border:1px solid var(--border);display:none;}
        .split-details.show{display:block;}
        .split-details .form-group{margin-bottom:.65rem;}
        .split-details .form-group:last-child{margin-bottom:0;}
        .modal-actions{display:flex;gap:.75rem;margin-top:1.5rem;}
        .btn{flex:1;padding:.65rem;border-radius:10px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
        .btn-primary{background:var(--primary);color:#fff;}
        .btn-primary:hover{background:#6d28d9;}
        .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
        .btn-secondary:hover{background:var(--border);}

        /* ── RESPONSIVE ── */
        @media(max-width:800px){
            .summary-wrap{grid-template-columns:1fr;padding:1rem;}
            .main-grid{grid-template-columns:1fr;padding:0 1rem 1.5rem;}
            .header{padding:.75rem 1rem;}
            .balance-amount{font-size:2.5rem;}
            .reset-btn{display:none;}
        }
    </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
    <div class="header-title">
        <div class="logo">💜</div>
        <h1>Alejandra</h1>
    </div>
    <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-name" id="monthName"></span>
        <button id="nextMonth">›</button>
    </div>
    <button class="reset-btn" id="resetBtn">Reiniciar mes</button>
</header>

<!-- ═══ BALANCE HERO ═══ -->
<div class="balance-hero">
    <div class="balance-label">Balance disponible</div>
    <div class="balance-amount" id="balanceAmount">$0.00</div>
    <div class="balance-hint"   id="balanceHint"></div>
</div>

<!-- ═══ SUMMARY CARDS ═══ -->
<div class="summary-wrap">
    <div class="scard" style="border-color:#059669">
        <div class="scard-label">Dinero cobrado</div>
        <div class="scard-amount" id="sCobrado" style="color:#059669">$0.00</div>
        <div class="scard-sub"    id="sCobraSub"></div>
        <div class="progress-bar"><div class="progress-fill" id="sCobraBar" style="width:0%;background:#059669"></div></div>
    </div>
    <div class="scard" style="border-color:#dc2626">
        <div class="scard-label">Gastos pagados</div>
        <div class="scard-amount" id="sPagado" style="color:#dc2626">$0.00</div>
        <div class="scard-sub"    id="sPagaSub"></div>
        <div class="progress-bar"><div class="progress-fill" id="sPagaBar" style="width:0%;background:#dc2626"></div></div>
    </div>
    <div class="scard" style="border-color:#d97706">
        <div class="scard-label">Gastos por pagar</div>
        <div class="scard-amount" id="sPorPagar" style="color:#d97706">$0.00</div>
        <div class="scard-sub"    id="sPorPagarSub"></div>
    </div>
</div>

<!-- ═══ MAIN GRID (rendered by JS) ═══ -->
<div class="main-grid">
    <div class="col" id="col0"></div>
    <div class="col" id="col1"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="overlay" id="overlay">
    <div class="modal">
        <h3 id="mTitle">Agregar</h3>
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="mNombre" placeholder="Nombre">
        </div>
        <div class="form-group">
            <label>Monto ($)</label>
            <input type="number" id="mMonto" placeholder="0.00" step="0.01" min="0">
        </div>
        <!-- Split toggle (solo para secciones de cobro) -->
        <div id="splitGroup" style="display:none">
            <label class="split-toggle" id="splitToggleLabel">
                <input type="checkbox" id="mSplit">
                <div class="split-pill"></div>
                <span style="font-size:.85rem;font-weight:600;">Dividir en dos pagos</span>
            </label>
            <div class="split-details" id="splitDetails">
                <div class="form-row">
                    <div class="form-group">
                        <label>Etiqueta 1ra parte</label>
                        <input type="text" id="mLabel1" value="1ra quincena">
                    </div>
                    <div class="form-group">
                        <label>Monto 1ra parte ($)</label>
                        <input type="number" id="mMonto1" step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Etiqueta 2da parte</label>
                        <input type="text" id="mLabel2" value="2da quincena">
                    </div>
                    <div class="form-group">
                        <label>Monto 2da parte ($)</label>
                        <input type="number" id="mMonto2" step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="mCancel">Cancelar</button>
            <button class="btn btn-primary"   id="mSave">Guardar</button>
        </div>
    </div>
</div>

<!-- ═══ SCRIPT ═══ -->
<script>
/* ─── COLORES ─── */
const C = {
    income:  { css:'#059669', lt:'#d1fae5', icon:'↑' },
    pending: { css:'#d97706', lt:'#fef3c7', icon:'⧗' },
    expense: { css:'#dc2626', lt:'#fee2e2', icon:'↓' },
    parami:  { css:'#7c3aed', lt:'#ede9fe', icon:'♥' },
    otro:    { css:'#0ea5e9', lt:'#e0f2fe', icon:'◎' },
    teal:    { css:'#0d9488', lt:'#ccfbf1', icon:'●' },
    rose:    { css:'#e11d48', lt:'#ffe4e6', icon:'◆' },
    slate:   { css:'#64748b', lt:'#f1f5f9', icon:'■' },
};
const COBRO_COLORS = ['income','pending','teal'];
const PAGO_COLORS  = ['expense','parami','otro','rose','slate'];

/* ─── PLANTILLA ─── */
const PLANTILLA_SECS = [
    { id:'ingresos',  nombre:'Ingresos',         col:0, tipo:'cobro', ck:'income',  fijo:true,
      tpl:[ {nombre:'Andrea Nieli',monto:200},{nombre:'Michi',monto:120},{nombre:'Livre',monto:50},
            {nombre:'Valora',monto:150},{nombre:'Neo',monto:400},{nombre:'Click',monto:120},{nombre:'Cambotti',monto:50} ] },
    { id:'pendientes',nombre:'Pagos Pendientes',  col:0, tipo:'cobro', ck:'pending', fijo:false, tpl:[] },
    { id:'fijos',     nombre:'Gastos Fijos',      col:1, tipo:'pago',  ck:'expense', fijo:true,
      tpl:[ {nombre:'Datalink Guacuco',monto:27},{nombre:'Datalink Santa Ana',monto:27},
            {nombre:'CANTV / CORPOELEC',monto:25},{nombre:'Datalinks JJ',monto:63},
            {nombre:'Gym',monto:60},{nombre:'Andrea',monto:15},{nombre:'Condominio',monto:56.26} ] },
    { id:'parami',    nombre:'Para Mí',           col:1, tipo:'pago',  ck:'parami',  fijo:false, tpl:[] },
    { id:'otros',     nombre:'Otros Gastos',      col:1, tipo:'pago',  ck:'otro',    fijo:false, tpl:[] },
];

/* Datos especiales Abril 2026 */
const ABRIL = {
    pendientes:[ {nombre:'JJVQ',monto:187.5},{nombre:'A/A camioneta',monto:50},{nombre:'Rebe me tiene',monto:50} ],
    otros:[
        {nombre:'Cuota portón eléctrico',monto:22.5},{nombre:'NEW cuota extra condominio',monto:35},
        {nombre:'Cuota especial condominio',monto:48.64},{nombre:'Alejandro',monto:360},
        {nombre:'Ginecólogo',monto:40},{nombre:'Lunares',monto:50},{nombre:'Llaves del carro',monto:8},
        {nombre:'Colchones',monto:30},{nombre:'Veterinario Randall',monto:25},{nombre:'Zapatos mami',monto:30},
        {nombre:'Cholas pa',monto:10},{nombre:'Giovanni Patiño',monto:79},{nombre:'Rebecca',monto:105},
    ],
};

/* ─── ESTADO ─── */
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let cur = new Date(), mesKey = getMesKey(cur);
let modalSecId = null, modalItemId = null;
let data = cargarDatos(mesKey);

function getMesKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function getMesNombre(d){ return `${MESES[d.getMonth()]} ${d.getFullYear()}`; }
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }

/* ─── MIGRACIÓN desde formato viejo ─── */
function migrar(d, key){
    if(d.secciones) {
        // Formato nuevo — verificar que abril tenga sus datos
        if(key==='2026-04') rellenarAbril(d);
        return d;
    }
    // Convertir formato viejo al nuevo
    const nuevo = { secciones: crearSecciones(key) };
    const find = id => nuevo.secciones.find(s=>s.id===id);

    (d.ingresos||[]).forEach(i => find('ingresos').items.push(
        {id:i.id||uid(),nombre:i.nombre,monto:i.monto,cobrado:i.cobrado||false}));
    (d.pagosPendientes||[]).forEach(p => find('pendientes').items.push(
        {id:p.id||uid(),nombre:p.nombre,monto:p.monto,cobrado:p.cobrado||false}));
    (d.gastos||[]).forEach(g=>{
        const tipo = g.tipo||'otro';
        const secId = tipo==='fijo'?'fijos':tipo==='parami'?'parami':'otros';
        find(secId)?.items.push({id:g.id||uid(),nombre:g.nombre,monto:g.monto,pagado:g.pagado||false});
    });
    if(key==='2026-04') rellenarAbril(nuevo);
    return nuevo;
}

function crearSecciones(key){
    const es04 = key==='2026-04';
    return PLANTILLA_SECS.map(ps=>{
        let tplItems = ps.fijo ? ps.tpl : [];
        if(es04 && ps.id==='pendientes') tplItems = ABRIL.pendientes;
        if(es04 && ps.id==='otros')      tplItems = ABRIL.otros;
        const esIngreso = ps.tipo==='cobro';
        return {
            id: ps.id, nombre: ps.nombre, col: ps.col,
            tipo: ps.tipo, ck: ps.ck, fijo: ps.fijo,
            items: tplItems.map(t=>({
                id:uid(), nombre:t.nombre, monto:t.monto,
                ...(esIngreso ? {cobrado:false} : {pagado:false})
            }))
        };
    });
}

function rellenarAbril(d){
    const pendSec = d.secciones.find(s=>s.id==='pendientes');
    const otroSec = d.secciones.find(s=>s.id==='otros');
    if(pendSec && pendSec.items.length===0)
        pendSec.items = ABRIL.pendientes.map(p=>({id:uid(),nombre:p.nombre,monto:p.monto,cobrado:false}));
    if(otroSec && otroSec.items.length===0)
        otroSec.items = ABRIL.otros.map(g=>({id:uid(),nombre:g.nombre,monto:g.monto,pagado:false}));
}

function cargarDatos(key){
    const raw = localStorage.getItem(`ale_${key}`);
    if(raw) return migrar(JSON.parse(raw), key);
    return { secciones: crearSecciones(key) };
}
function guardar(){ localStorage.setItem(`ale_${mesKey}`, JSON.stringify(data)); }

/* ─── CÁLCULOS ─── */
function itemCobradoMonto(item){
    if(!item.split) return item.cobrado ? item.monto : 0;
    return (item.partes||[]).filter(p=>p.cobrado).reduce((s,p)=>s+p.monto,0);
}

function totales(){
    let cobTotal=0, cobBase=0, pagTotal=0, pagBase=0;
    data.secciones.forEach(sec=>{
        sec.items.forEach(item=>{
            if(sec.tipo==='cobro'){ cobBase+=item.monto; cobTotal+=itemCobradoMonto(item); }
            else                  { pagBase+=item.monto; pagTotal+=item.pagado?item.monto:0; }
        });
    });
    return { cobTotal, cobBase, pagTotal, pagBase,
             porPagar: pagBase-pagTotal, balance: cobTotal-pagTotal };
}

function fmt(n){
    const abs=Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    return (n<0?'-':'')+'$'+abs;
}

/* ─── RENDER PRINCIPAL ─── */
function render(){
    const t = totales();
    document.getElementById('monthName').textContent = getMesNombre(cur);

    const bEl = document.getElementById('balanceAmount');
    bEl.textContent = fmt(t.balance);
    bEl.className = 'balance-amount'+(t.balance<0?' neg':t.balance<50?' warn':'');
    document.getElementById('balanceHint').textContent = t.porPagar>0
        ? `Aún tenés ${fmt(t.porPagar)} por pagar`
        : (t.balance>=0?'Todos los gastos al día ✓':'');

    document.getElementById('sCobrado').textContent = fmt(t.cobTotal);
    document.getElementById('sCobraSub').textContent = `de ${fmt(t.cobBase)} disponibles`;
    document.getElementById('sPagado').textContent  = fmt(t.pagTotal);
    document.getElementById('sPagaSub').textContent  = `de ${fmt(t.pagBase)} totales`;
    document.getElementById('sPorPagar').textContent = fmt(t.porPagar);
    document.getElementById('sPorPagarSub').textContent =
        `${data.secciones.flatMap(s=>s.tipo==='pago'?s.items:[]).filter(g=>!g.pagado).length} pendientes`;

    const pI = t.cobBase>0 ? t.cobTotal/t.cobBase*100 : 0;
    const pP = t.pagBase>0 ? t.pagTotal/t.pagBase*100 : 0;
    document.getElementById('sCobraBar').style.width = pI+'%';
    document.getElementById('sPagaBar').style.width  = pP+'%';

    renderColumnas();
}

/* ─── RENDER COLUMNAS ─── */
function renderColumnas(){
    [0,1].forEach(col=>{
        const container = document.getElementById('col'+col);
        container.innerHTML='';
        data.secciones.filter(s=>s.col===col).forEach(sec=>{
            container.appendChild(renderSeccion(sec));
        });
        // Botón agregar sección
        const addBtn = document.createElement('button');
        addBtn.className='add-section-btn';
        addBtn.textContent='＋ Nueva sección';
        addBtn.onclick=()=>agregarSeccion(col);
        container.appendChild(addBtn);
    });
}

function renderSeccion(sec){
    const color = C[sec.ck] || C.slate;
    const card = document.createElement('div');
    card.className='section';
    card.style.setProperty('--sec', color.css);
    card.style.setProperty('--sec-lt', color.lt);

    // Head
    const head = document.createElement('div');
    head.className='section-head';
    head.innerHTML=`
        <span class="sec-icon">${color.icon}</span>
        <span class="sec-name" id="secname-${sec.id}">${sec.nombre}</span>
        <div class="sec-actions">
            <button class="sec-btn" onclick="renombrarSeccion('${sec.id}')" title="Renombrar">✎</button>
            <button class="sec-btn del" onclick="eliminarSeccion('${sec.id}')" title="Eliminar sección">✕</button>
            <button class="add-btn" onclick="abrirModal('${sec.id}')">+ Agregar</button>
        </div>
    `;
    card.appendChild(head);

    // Items
    const list = document.createElement('div');
    list.className='items-list';
    if(!sec.items.length){
        list.innerHTML='<div class="empty-state">Vacío — usá + para agregar</div>';
    } else {
        const sorted = [...sec.items].sort((a,b)=>{
            const dA = sec.tipo==='cobro' ? itemCobradoMonto(a)>=a.monto : a.pagado;
            const dB = sec.tipo==='cobro' ? itemCobradoMonto(b)>=b.monto : b.pagado;
            return dA-dB;
        });
        sorted.forEach(item=>list.appendChild(crearItemEl(item, sec)));
    }
    card.appendChild(list);

    // Footer
    const total = sec.items.reduce((s,i)=>s+i.monto,0);
    const foot = document.createElement('div');
    foot.className='section-foot';
    foot.innerHTML=`<span>Total</span><strong>${fmt(total)}</strong>`;
    card.appendChild(foot);

    return card;
}

/* ─── CREAR ELEMENTO ITEM ─── */
function crearItemEl(item, sec){
    const esCobro = sec.tipo==='cobro';

    if(item.split && esCobro && item.partes?.length){
        return crearItemSplit(item, sec);
    }

    const done = esCobro ? item.cobrado : item.pagado;
    const label = done ? (esCobro?'Cobrado':'Pagado') : '';
    const title = done
        ? (esCobro?'Marcar como no cobrado':'Marcar como no pagado')
        : (esCobro?'Marcar como cobrado':'Marcar como pagado');

    const div = document.createElement('div');
    div.className=`item${done?' done':''}`;
    div.innerHTML=`
        <button class="toggle${done?' on':''}"
                onclick="toggleItem('${item.id}','${sec.id}')" title="${title}">${done?'✓':''}</button>
        <span class="item-name" title="${item.nombre}">${item.nombre}</span>
        ${done?`<span class="badge">${label}</span>`:''}
        <span class="item-amount">${fmt(item.monto)}</span>
        <button class="edit-btn"     onclick="abrirModal('${sec.id}','${item.id}')" title="Editar">✎</button>
        <button class="del-item-btn" onclick="eliminarItem('${item.id}','${sec.id}')" title="Eliminar">×</button>
    `;
    return div;
}

function crearItemSplit(item, sec){
    const cobradoPartes = (item.partes||[]).filter(p=>p.cobrado).length;
    const totalPartes   = (item.partes||[]).length;
    const allDone  = cobradoPartes===totalPartes && totalPartes>0;
    const someDone = cobradoPartes>0 && !allDone;
    const statusIcon = allDone?'✓': someDone?'½':'○';
    const statusClass = allDone?'':'partial-icon';

    const wrap = document.createElement('div');

    const parent = document.createElement('div');
    parent.className=`item item-parent${allDone?' done':someDone?' partial':''}`;
    parent.innerHTML=`
        <span class="split-status ${statusClass}">${statusIcon}</span>
        <span class="item-name" title="${item.nombre}"><strong>${item.nombre}</strong></span>
        <span class="item-amount">${fmt(item.monto)}</span>
        <button class="edit-btn"     onclick="abrirModal('${sec.id}','${item.id}')" title="Editar">✎</button>
        <button class="del-item-btn" onclick="eliminarItem('${item.id}','${sec.id}')" title="Eliminar">×</button>
    `;
    wrap.appendChild(parent);

    (item.partes||[]).forEach(parte=>{
        const pd = parte.cobrado;
        const p = document.createElement('div');
        p.className=`item split-part${pd?' done':''}`;
        p.innerHTML=`
            <button class="toggle${pd?' on':''}"
                    onclick="toggleParte('${item.id}','${sec.id}','${parte.id}')">${pd?'✓':''}</button>
            <span class="item-name">${parte.label}</span>
            ${pd?'<span class="badge">Cobrado</span>':''}
            <span class="item-amount">${fmt(parte.monto)}</span>
        `;
        wrap.appendChild(p);
    });

    return wrap;
}

/* ─── ACCIONES ITEMS ─── */
function toggleItem(itemId, secId){
    const sec = data.secciones.find(s=>s.id===secId);
    const item = sec.items.find(i=>i.id===itemId);
    if(!item) return;
    if(sec.tipo==='cobro') item.cobrado=!item.cobrado;
    else item.pagado=!item.pagado;
    guardar(); render();
}

function toggleParte(itemId, secId, parteId){
    const sec  = data.secciones.find(s=>s.id===secId);
    const item = sec.items.find(i=>i.id===itemId);
    const parte = item.partes.find(p=>p.id===parteId);
    parte.cobrado=!parte.cobrado;
    item.cobrado = item.partes.every(p=>p.cobrado);
    guardar(); render();
}

function eliminarItem(itemId, secId){
    if(!confirm('¿Eliminar este elemento?')) return;
    const sec = data.secciones.find(s=>s.id===secId);
    sec.items = sec.items.filter(i=>i.id!==itemId);
    guardar(); render();
}

/* ─── ACCIONES SECCIONES ─── */
function eliminarSeccion(secId){
    const sec = data.secciones.find(s=>s.id===secId);
    const msg = sec.items.length
        ? `¿Eliminar la sección "${sec.nombre}" y sus ${sec.items.length} elemento(s)?`
        : `¿Eliminar la sección "${sec.nombre}"?`;
    if(!confirm(msg)) return;
    data.secciones = data.secciones.filter(s=>s.id!==secId);
    guardar(); render();
}

function renombrarSeccion(secId){
    const sec = data.secciones.find(s=>s.id===secId);
    const spanEl = document.getElementById('secname-'+secId);
    if(!spanEl) return;
    const inp = document.createElement('input');
    inp.className='sec-name-input';
    inp.value=sec.nombre;
    spanEl.replaceWith(inp);
    inp.focus(); inp.select();
    const save=()=>{
        const v=inp.value.trim();
        if(v) sec.nombre=v;
        guardar(); render();
    };
    inp.addEventListener('blur',save);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter')save(); if(e.key==='Escape')render(); });
}

function agregarSeccion(col){
    const nombre = prompt('Nombre de la nueva sección:','');
    if(!nombre?.trim()) return;
    const secsTipo = data.secciones.filter(s=>s.col===col);
    const tipo = col===0?'cobro':'pago';
    const colores = tipo==='cobro'?COBRO_COLORS:PAGO_COLORS;
    const usados = secsTipo.map(s=>s.ck);
    const ck = colores.find(c=>!usados.includes(c)) || colores[secsTipo.length % colores.length];
    const esIngreso = tipo==='cobro';
    data.secciones.push({ id:'sec_'+uid(), nombre:nombre.trim(), col, tipo, ck, fijo:false, items:[] });
    guardar(); render();
}

/* ─── MODAL ─── */
function abrirModal(secId, itemId=null){
    const sec  = data.secciones.find(s=>s.id===secId);
    const item = itemId ? sec.items.find(i=>i.id===itemId) : null;
    modalSecId  = secId;
    modalItemId = itemId;

    const esCobro = sec.tipo==='cobro';
    document.getElementById('mTitle').textContent = item
        ? `Editar — ${sec.nombre}`
        : `Agregar a ${sec.nombre}`;

    document.getElementById('mNombre').value = item?.nombre || '';
    document.getElementById('mMonto').value  = item?.monto  || '';
    document.getElementById('mSave').textContent = item ? 'Actualizar' : 'Guardar';

    // Split toggle: solo para secciones de cobro
    const splitGroup = document.getElementById('splitGroup');
    splitGroup.style.display = esCobro ? 'block' : 'none';

    const hasSplit = item?.split && item.partes?.length;
    const splitToggle = document.getElementById('splitToggleLabel');
    const mSplit = document.getElementById('mSplit');
    mSplit.checked = !!hasSplit;
    splitToggle.classList.toggle('active', !!hasSplit);
    document.getElementById('splitDetails').classList.toggle('show', !!hasSplit);

    if(hasSplit){
        document.getElementById('mLabel1').value  = item.partes[0]?.label || '1ra quincena';
        document.getElementById('mMonto1').value  = item.partes[0]?.monto || '';
        document.getElementById('mLabel2').value  = item.partes[1]?.label || '2da quincena';
        document.getElementById('mMonto2').value  = item.partes[1]?.monto || '';
    } else {
        document.getElementById('mLabel1').value  = '1ra quincena';
        document.getElementById('mLabel2').value  = '2da quincena';
        document.getElementById('mMonto1').value  = '';
        document.getElementById('mMonto2').value  = '';
    }

    document.getElementById('overlay').classList.add('open');
    document.getElementById('mNombre').focus();
}

function cerrarModal(){
    document.getElementById('overlay').classList.remove('open');
    modalSecId = modalItemId = null;
}

// Toggle split UI
document.getElementById('mSplit').addEventListener('change', function(){
    const checked = this.checked;
    document.getElementById('splitToggleLabel').classList.toggle('active', checked);
    document.getElementById('splitDetails').classList.toggle('show', checked);
    if(checked){
        const total = parseFloat(document.getElementById('mMonto').value)||0;
        const half  = (total/2).toFixed(2);
        document.getElementById('mMonto1').value = half;
        document.getElementById('mMonto2').value = half;
    }
});

// Auto-split when total changes
document.getElementById('mMonto').addEventListener('input', function(){
    if(!document.getElementById('mSplit').checked) return;
    const total = parseFloat(this.value)||0;
    const half  = (total/2).toFixed(2);
    document.getElementById('mMonto1').value = half;
    document.getElementById('mMonto2').value = half;
});

document.getElementById('mCancel').addEventListener('click', cerrarModal);
document.getElementById('overlay').addEventListener('click', e=>{
    if(e.target===document.getElementById('overlay')) cerrarModal();
});

document.getElementById('mSave').addEventListener('click', ()=>{
    const nombre = document.getElementById('mNombre').value.trim();
    const monto  = parseFloat(document.getElementById('mMonto').value);
    if(!nombre){ document.getElementById('mNombre').focus(); return; }
    if(isNaN(monto)||monto<=0){ document.getElementById('mMonto').focus(); return; }

    const sec    = data.secciones.find(s=>s.id===modalSecId);
    const esCobro= sec.tipo==='cobro';
    const useSplit = esCobro && document.getElementById('mSplit').checked;

    let splitData = null;
    if(useSplit){
        const m1 = parseFloat(document.getElementById('mMonto1').value)||0;
        const m2 = parseFloat(document.getElementById('mMonto2').value)||0;
        const l1 = document.getElementById('mLabel1').value.trim()||'1ra quincena';
        const l2 = document.getElementById('mLabel2').value.trim()||'2da quincena';
        if(m1<=0||m2<=0){ alert('Ingresá los montos de ambas partes.'); return; }
        splitData = { split:true, partes:[
            {id:uid(), label:l1, monto:m1, cobrado:false},
            {id:uid(), label:l2, monto:m2, cobrado:false}
        ]};
    }

    if(modalItemId){
        // Editar existente
        const item = sec.items.find(i=>i.id===modalItemId);
        if(item){
            item.nombre = nombre;
            item.monto  = monto;
            if(useSplit){
                // Preserve cobrado state if partes count matches
                if(item.partes?.length===2){
                    splitData.partes[0].cobrado = item.partes[0].cobrado;
                    splitData.partes[0].id      = item.partes[0].id;
                    splitData.partes[1].cobrado = item.partes[1].cobrado;
                    splitData.partes[1].id      = item.partes[1].id;
                }
                Object.assign(item, splitData);
            } else {
                delete item.split; delete item.partes;
            }
        }
    } else {
        // Crear nuevo
        const nuevoItem = { id:uid(), nombre, monto,
            ...(esCobro ? {cobrado:false} : {pagado:false}),
            ...(splitData||{}) };
        sec.items.push(nuevoItem);
    }
    guardar(); cerrarModal(); render();
});

document.getElementById('mMonto').addEventListener('keydown', e=>{
    if(e.key==='Enter') document.getElementById('mSave').click();
});

/* ─── NAVEGACIÓN MESES ─── */
document.getElementById('prevMonth').addEventListener('click',()=>{
    cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);
    mesKey=getMesKey(cur); data=cargarDatos(mesKey); render();
});
document.getElementById('nextMonth').addEventListener('click',()=>{
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    mesKey=getMesKey(cur); data=cargarDatos(mesKey); render();
});
document.getElementById('resetBtn').addEventListener('click',()=>{
    if(!confirm(`¿Reiniciar ${getMesNombre(cur)} con la plantilla base?`)) return;
    localStorage.removeItem(`ale_${mesKey}`);
    data=cargarDatos(mesKey); render();
});

/* ─── INICIO ─── */
render();
</script>
